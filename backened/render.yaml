services:
  - type: web
    name: crypto-prediction-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 5001
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: crypto-data
      mountPath: /data
      sizeGB: 1
